services:
  srs:
    image: ossrs/srs:6
    container_name: srs
    env_file: ../../.env
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/srs/conf/entrypoint.sh"]
    volumes:
      - ./srs.conf.template:/usr/local/srs/conf/srs.conf.template:ro
      - ./entrypoint.sh:/usr/local/srs/conf/entrypoint.sh:ro
      # HLS output — shared with the Node app's media directory
      - ${SRS_MEDIA_PATH:-./media}:/usr/local/srs/objs/nginx/html
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
      - "${SRS_SRT_PORT:-10080}:10080/udp"
    environment:
      SRT_PASSPHRASE: ${SRT_PASSPHRASE:-}
      SRS_ADAPTER_PORT: ${SRS_ADAPTER_PORT:-3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
